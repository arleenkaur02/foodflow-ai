  - type: web
    name: foodflow-ai-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: HOSTNAME=0.0.0.0 node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_API_URL
        value: https://foodflow-ai-api.onrender.com
